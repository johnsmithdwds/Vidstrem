.video-card{background:#1a1d27;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);transition:all 0.3s;animation:fadeUp 0.4s ease both;}

.thumb-wrapper{position:relative;aspect-ratio:16/9;overflow:hidden;cursor:pointer;background:#111;}
.thumb-wrapper video{width:100%;height:100%;object-fit:cover;transition:transform 0.5s, filter 0.5s;}
.video-card:hover .thumb-wrapper video{transform:scale(1.05);}
.thumb-wrapper video.blurred{filter:blur(12px) brightness(0.5);transform:scale(1.1);}

.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,17,23,0.7),transparent);display:flex;align-items:center;justify-content:center;opacity:1;transition:opacity 0.3s;pointer-events:none;}

function genVideos(catId,startId){
  var titles=videoTitles[catId]||videoTitles.trending;
  return titles.map(function(t,i){
    return {id:startId+i,title:t,video:vSrc[i%vSrc.length],duration:durs[i%durs.length],views:vws[i%vws.length],category:catId};
  });
}

function initState(){
  state={};

var svgPlay='<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';

function renderCatNav(){
  var nav=document.getElementById('catNav');
  nav.innerHTML=categories.map(function(c){
    return '<button class="cat-btn'+(c.id===currentCat?' active':'')+'" onclick="switchCategory(\''+c.id+'\')">'+c.name+'</button>';
  }).join('');
}

function switchCategory(catId){
  // Clear all blur timers
  Object.keys(blurTimers).forEach(function(k){clearTimeout(blurTimers[k]);});
  currentCat=catId;
  var cat=categories.find(function(c){return c.id===catId;});
  document.getElementById('pageTitle').textContent=cat?cat.name:'Videos';
  document.getElementById('searchInput').value='';
  renderCatNav();
  renderVideos(allVideos[currentCat]);
}

function renderVideos(list){
  var grid=document.getElementById('videoGrid');
  var noRes=document.getElementById('noResults');
  if(list.length===0){grid.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';

  var html='<div class="video-grid">';
  list.forEach(function(v,i){
    var s=state[v.id];
    html+='<div class="video-card" style="animation-delay:'+i*50+'ms">';
    html+='<div class="thumb-wrapper" data-vid="'+v.id+'">';
    html+='<video src="'+v.video+'#t=0.5" muted loop playsinline preload="metadata" class="'+(s.blurred?'blurred':'')+'"></video>';
    html+='<div class="thumb-overlay'+(s.playing?' hidden':'')+'"><div class="play-btn">'+svgPlay+'</div></div>';
    html+='<span class="duration">'+v.duration+'</span>';
    // Watch Full HD overlay (shows when blurred)
    html+='<div class="fullhd-overlay'+(s.blurred?' show':'')+'" data-fullhd="'+v.id+'">';
    html+='<div class="lock-icon">'+svgLock+'</div>';
    html+='<p>ভিডিওটি দেখতে নিচে ক্লিক করুন</p>';
    html+='<button class="fullhd-btn" onclick="event.stopPropagation();openSmartLink()">▶ Watch Full HD Video</button>';
    html+='</div>';
    html+='</div>';
    html+='<div class="card-info"><h3>'+v.title+'</h3>';
    html+='<div class="card-meta">';
    html+='<span class="views">'+svgEye+' '+v.views+' views</span>';
    html+='<div class="card-actions">';
    html+='<button class="action-btn '+(s.liked?'liked':'')+'" onclick="event.stopPropagation();toggleLike('+v.id+')">'+svgHeart+'<span>'+s.likes+'</span></button>';
    html+='<button class="action-btn" onclick="event.stopPropagation();shareVideo('+v.id+')">'+svgShare+'</button>';
    html+='<button class="dl-btn" onclick="event.stopPropagation();handleDownload('+v.id+')" title="Download">'+svgDl+'</button>';
    html+='</div></div></div></div>';
  });
  html+='</div>';
  grid.innerHTML=html;

  // Attach click handlers
  document.querySelectorAll('.thumb-wrapper').forEach(function(wrapper){
    var vid=parseInt(wrapper.getAttribute('data-vid'));
    wrapper.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      handleCardClick(vid,wrapper);
    },{passive:false});
  });

  // Resume playing videos
  document.querySelectorAll('.thumb-wrapper').forEach(function(wrapper){
    var vid=parseInt(wrapper.getAttribute('data-vid'));
    if(state[vid]&&state[vid].playing){
      var videoEl=wrapper.querySelector('video');
      if(videoEl){videoEl.play().catch(function(){});}
    }
  });
}

function handleCardClick(id,wrapper){
  var s=state[id];
  if(!s)return;

  // If blurred, the fullhd overlay button handles it
  if(s.blurred)return;

  if(!s.playing){
    // First click: play video, then auto-blur after 3 seconds
    s.playing=true;
    var videoEl=wrapper.querySelector('video');
    var overlay=wrapper.querySelector('.thumb-overlay');
    if(overlay)overlay.classList.add('hidden');
    if(videoEl){videoEl.play().catch(function(){});}

    // Auto blur after BLUR_DELAY
    blurTimers[id]=setTimeout(function(){
      s.blurred=true;
      var v=videoEl;
      if(v)v.classList.add('blurred');
      var fhd=wrapper.querySelector('[data-fullhd="'+id+'"]');
      if(fhd)fhd.classList.add('show');
    },BLUR_DELAY);
  }
}

// ===== SMART LINK WITH COUNTDOWN =====
var pendingLink="";

function getRandomSmartLink(){
  return SMART_LINKS[Math.floor(Math.random() * SMART_LINKS.length)];
}

function openSmartLink(){
  pendingLink = getRandomSmartLink();
  showCountdown();
}

function showCountdown(){
  var modal=document.getElementById('countdownModal');
  var numEl=document.getElementById('countdownNum');
  var barEl=document.getElementById('countdownBar');
  var goBtn=document.getElementById('countdownGo');

  modal.classList.add('show');
  goBtn.classList.remove('ready');
  var sec=COUNTDOWN_SEC;
  numEl.textContent=sec;
  barEl.style.width='0%';

  var iv=setInterval(function(){
    sec--;
    numEl.textContent=sec;
    barEl.style.width=(((COUNTDOWN_SEC-sec)/COUNTDOWN_SEC)*100)+'%';
    if(sec<=0){
      clearInterval(iv);
      barEl.style.width='100%';
      numEl.textContent='✓';
      goBtn.classList.add('ready');
    }
  },1000);
}

function goToLink(){
  document.getElementById('countdownModal').classList.remove('show');
  if(pendingLink){
    window.open(pendingLink,'_blank');
    pendingLink="";
  }
}

// ===== DOWNLOAD: 1st click = smart link, 2nd click = real download =====
function handleDownload(id){
  var v=findVideo(id);
  var s=state[id];
  if(!v||!s)return;
  if(!s.dlClicked){
    s.dlClicked=true;
    pendingLink=DL_SMART_LINK;
    showCountdown();
  } else {
    var a=document.createElement('a');a.href=v.video;a.download=v.title+'.mp4';a.target='_blank';a.click();
  }
}

function toggleLike(id){
  var s=state[id];
  if(!s)return;
  s.liked=!s.liked;
  s.likes+=s.liked?1:-1;
  renderVideos(currentList());
}

function shareVideo(id){
  var v=findVideo(id);
  if(!v)return;
  if(navigator.share){navigator.share({title:v.title,text:'Watch "'+v.title+'" on VidStream!',url:window.location.href}).catch(function(){});}
  else{navigator.clipboard.writeText(window.location.href).catch(function(){});}
}

function findVideo(id){
  for(var cat in allVideos){
    var found=allVideos[cat].find(function(v){return v.id===id;});
    if(found)return found;
  }
  return null;
}

function currentList(){
  var q=document.getElementById('searchInput').value.toLowerCase();
  return allVideos[currentCat].filter(function(v){return v.title.toLowerCase().indexOf(q)!==-1;});
}

document.getElementById('searchInput').addEventListener('input',function(){renderVideos(currentList());});
renderCatNav();
renderVideos(allVideos[currentCat]);
</script>
