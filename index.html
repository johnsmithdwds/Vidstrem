<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidStream - Watch & Download Videos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #121212;
  color: #f2f2f2;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(18, 18, 18, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid #2a2a2a;
  padding: 12px 16px;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #e53935, #ff5252);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon svg { width: 20px; height: 20px; fill: white; }

.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #f2f2f2;
}

.logo-text span { color: #e53935; }

.search-box {
  flex: 1;
  max-width: 500px;
  margin: 0 auto;
  position: relative;
}

.search-box svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  stroke: #888;
  fill: none;
  stroke-width: 2;
}

.search-box input {
  width: 100%;
  background: #262626;
  color: #f2f2f2;
  border: none;
  border-radius: 50px;
  padding: 10px 16px 10px 40px;
  font-size: 14px;
  outline: none;
  transition: box-shadow 0.3s;
  font-family: 'DM Sans', sans-serif;
}

.search-box input::placeholder { color: #888; }
.search-box input:focus { box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.4); }

/* Main */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 16px;
}

.main h2 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 24px;
}

.no-results {
  text-align: center;
  color: #888;
  padding: 80px 0;
  font-size: 16px;
}

/* Grid */
.video-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 480px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 768px) { .video-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1024px) { .video-grid { grid-template-columns: repeat(4, 1fr); } }

/* Video Card */
.video-card {
  background: #1c1c1c;
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.3s;
  animation: fadeUp 0.4s ease both;
}

.video-card:hover {
  box-shadow: 0 0 0 1px rgba(229, 57, 53, 0.4);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.thumb-wrapper {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  cursor: pointer;
}

.thumb-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s;
}

.video-card:hover .thumb-wrapper img { transform: scale(1.05); }

.thumb-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(18,18,18,0.7), transparent);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
}

.video-card:hover .thumb-overlay { opacity: 1; }

.play-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(229, 57, 53, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-btn svg { width: 20px; height: 20px; fill: white; margin-left: 2px; }

.duration {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(18, 18, 18, 0.8);
  color: #f2f2f2;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
}

.badge-watch {
  position: absolute;
  top: 8px;
  left: 8px;
  background: #e53935;
  color: white;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 50px;
  font-weight: 600;
  display: none;
}

.badge-watch.show { display: block; }

.card-info {
  padding: 12px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.card-info h3 {
  font-size: 14px;
  font-weight: 600;
  color: #f2f2f2;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dl-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #262626;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.dl-btn svg { width: 16px; height: 16px; stroke: #888; fill: none; stroke-width: 2; }
.dl-btn:hover { background: #e53935; }
.dl-btn:hover svg { stroke: white; }

/* Video Player */
.player-wrapper {
  aspect-ratio: 16/9;
}

.player-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.back-link {
  font-size: 12px;
  color: #888;
  cursor: pointer;
  margin-top: 4px;
  display: inline-block;
  transition: color 0.2s;
}

.back-link:hover { color: #e53935; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div class="logo-text">Vid<span>Stream</span></div>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search videos...">
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">
  <h2>Trending Videos</h2>
  <div class="video-grid" id="videoGrid"></div>
  <p class="no-results" id="noResults" style="display:none;">No videos found</p>
</main>

<script>
const videos = [
  { id:1, title:"Ridhi Sosa Apa Cox's Bazar Viral - সোসা আপার কক্সবাজার বিচ লিকড সেক্স HD", thumb:"https://https://i.imgur.com/jbqDeZG.jpeg?w=640&q=80", video:"https://raw.githubusercontent.com/johnsmithdwds/Private-videos/main/ViralLink_bf2dbd7087914.mp4", redirect:"https://redirect-lovable.pages.dev/", dlRedirect:"https://unlimited-pop.pages.dev/", duration:"4:32" },
  { id:2, title:"Ocean Waves Relaxation 4K", thumb:"https://https://i.imgur.com/jbqDeZG.jpeg?w=640&q=80", video:"https://raw.githubusercontent.com/johnsmithdwds/Private-videos/main/ViralLink_a618514bf22b4.mp4", redirect:"https://redirect-lovable.pages.dev/", dlRedirect:"https://unlimited-pop.pages.dev/", duration:"12:05" },
  { id:3, title:"City Night Drive Cinematic", thumb:"https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad3", dlRedirect:"https://example.com/dl3", duration:"8:17" },
  { id:4, title:"Wildlife Documentary - Lions", thumb:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad4", dlRedirect:"https://example.com/dl4", duration:"22:41" },
  { id:5, title:"Aurora Borealis Iceland", thumb:"https://images.unsplash.com/photo-1483347756197-71ef80e95f73?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad5", dlRedirect:"https://example.com/dl5", duration:"6:55" },
  { id:6, title:"Rainforest Ambience Sounds", thumb:"https://images.unsplash.com/photo-1448375240586-882707db888b?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad6", dlRedirect:"https://example.com/dl6", duration:"15:30" },
  { id:7, title:"Street Food Tour Tokyo", thumb:"https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad7", dlRedirect:"https://example.com/dl7", duration:"18:22" },
  { id:8, title:"Space Documentary - Mars", thumb:"https://images.unsplash.com/photo-1614732414444-096e5f1122d5?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad8", dlRedirect:"https://example.com/dl8", duration:"35:10" },
  { id:9, title:"Underwater Coral Reef 4K", thumb:"https://images.unsplash.com/photo-1546026423-cc4642628d2b?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad9", dlRedirect:"https://example.com/dl9", duration:"9:48" },
  { id:10, title:"Drone Footage Swiss Alps", thumb:"https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=640&q=80", video:"https://www.w3schools.com/html/mov_bbb.mp4", redirect:"https://example.com/ad10", dlRedirect:"https://example.com/dl10", duration:"11:03" }
];

const state = {};

function renderVideos(list) {
  const grid = document.getElementById('videoGrid');
  const noRes = document.getElementById('noResults');
  
  if (list.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = list.map((v, i) => {
    if (!state[v.id]) state[v.id] = { watchClicked: false, dlClicked: false, playing: false };
    const s = state[v.id];
    
    if (s.playing) {
      return `<div class="video-card" style="animation-delay:${i*50}ms">
        <div class="player-wrapper"><video src="${v.video}" controls autoplay></video></div>
        <div class="card-info">
          <h3>${v.title}</h3>
        </div>
        <div style="padding:0 12px 12px"><span class="back-link" onclick="backToThumb(${v.id})">← Back to thumbnail</span></div>
      </div>`;
    }

    return `<div class="video-card" style="animation-delay:${i*50}ms">
      <div class="thumb-wrapper" onclick="handleWatch(${v.id})">
        <img src="${v.thumb}" alt="${v.title}" loading="lazy">
        <div class="thumb-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div>
        <span class="duration">${v.duration}</span>
        <span class="badge-watch ${s.watchClicked?'show':''}" id="badge-${v.id}">Click to Watch</span>
      </div>
      <div class="card-info">
        <h3>${v.title}</h3>
        <button class="dl-btn" onclick="event.stopPropagation();handleDownload(${v.id})" title="${s.dlClicked?'Download Video':'Click to proceed'}">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function handleWatch(id) {
  const v = videos.find(x => x.id === id);
  const s = state[id];
  if (!s.watchClicked) {
    s.watchClicked = true;
    window.open(v.redirect, '_blank');
    renderVideos(currentList());
  } else {
    s.playing = true;
    renderVideos(currentList());
  }
}

function handleDownload(id) {
  const v = videos.find(x => x.id === id);
  const s = state[id];
  if (!s.dlClicked) {
    s.dlClicked = true;
    window.open(v.dlRedirect, '_blank');
  } else {
    const a = document.createElement('a');
    a.href = v.video;
    a.download = v.title + '.mp4';
    a.target = '_blank';
    a.click();
  }
}

function backToThumb(id) {
  state[id].playing = false;
  renderVideos(currentList());
}

function currentList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return videos.filter(v => v.title.toLowerCase().includes(q));
}

document.getElementById('searchInput').addEventListener('input', () => renderVideos(currentList()));

renderVideos(videos);
</script>
</body>
</html>
